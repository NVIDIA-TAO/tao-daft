name: Bug report
description: Report incorrect or unexpected behavior in tao-daft (validate, convert, datasets, CLI).
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug.

        ⚠️ **Do not report security vulnerabilities here.** Per
        [SECURITY.md](https://github.com/NVIDIA-TAO/tao-daft/blob/main/SECURITY.md), security issues must go to NVIDIA
        PSIRT (https://www.nvidia.com/object/submit-security-vulnerability.html),
        not GitHub.

  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `tao-daft --version`.
      placeholder: nvidia-tao-daft 7.0.0
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - validate
        - convert
        - datasets
        - CLI
        - formats/schemas
        - other
    validations:
      required: true

  - type: dropdown
    id: format
    attributes:
      label: Format (if applicable)
      options:
        - N/A
        - metropolis-v3.0
        - cosmos-reason-v1.0
        - tao-vl-reason-v1.0
    validations:
      required: false

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the actual behavior and what you expected instead.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: >
        The exact `tao-daft ...` command (or Python snippet) and a minimal
        dataset / JSON sample that triggers the issue. Paste full error output.
      render: shell
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version (3.10–3.13), and install method (`pip install` vs `git+`).
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
